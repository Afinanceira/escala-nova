<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFinanceira | Sistema de Escala</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="main-header">
            <div class="logo-area">
                <svg class="lighthouse-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L9 4V7H15V4L12 2Z" fill="#D4AF37"/>
                    <path d="M8 9L7 22H17L16 9H8ZM12 11C12.55 11 13 11.45 13 12C13 12.55 12.55 13 12 13C11.45 13 11 12.55 11 12C11 11.45 11.45 11 12 11Z" fill="#D4AF37"/>
                    <path d="M2 12H6M18 12H22M4 5L7 8M20 5L17 8" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <h1>AFinanceira</h1>
            </div>
            <div class="header-status">
                <span class="status-indicator"></span> Online
            </div>
        </header>

        <div class="card">
            <div class="card-header">
                <h2>Grade Horária do Turno</h2>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>HORÁRIO</th>
                            <th>PIXBET</th>
                            <th>BDS</th>
                            <th>BETVIP</th>
                            <th>GANHEI</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="escala-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="admin-panel" class="card">
            <div class="card-header">
                <h3>Configurações de Gerenciamento e Rodízio</h3>
            </div>
            <div class="admin-grid">
                <div class="input-group">
                    <label>Colaborador 1</label>
                    <input type="text" id="c1" value="Leandro" placeholder="Nome">
                </div>
                <div class="input-group">
                    <label>Colaborador 2</label>
                    <input type="text" id="c2" value="Ivah" placeholder="Nome">
                </div>
                <div class="input-group">
                    <label>Colaborador 3</label>
                    <input type="text" id="c3" value="Tarcyla" placeholder="Nome">
                </div>
                <div class="input-group">
                    <label>Colaborador 4</label>
                    <input type="text" id="c4" value="Paloma" placeholder="Nome">
                </div>
            </div>
            
            <div class="actions-area">
                <button id="btn-girar" class="btn-gold">🔄 Gerar e Girar Rodízio</button>
                <button id="btn-limpar" class="btn-danger">🗑️ Limpar Escala Ativa</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Flash Report - Ocorrências do Turno</h3>
            </div>
            <div class="flash-box">
                <p>Data: <span id="data-atual"></span></p>
                <textarea id="flash-text" placeholder="Digite aqui as ocorrências do turno... (Salva em tempo real)" rows="6" style="width: 100%; background: #0b1320; color: #fff; border: 1px solid #2c3e50; padding: 10px; border-radius: 4px;"></textarea>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
