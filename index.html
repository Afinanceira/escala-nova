<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AFinanceira | Sistema Operacional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Grade de Escala -->
        <div class="card">
            <h2>Grade Horária do Turno</h2>
            <table>
                <thead>
                    <tr>
                        <th>HORÁRIO</th>
                        <th>PIXBET</th>
                        <th>BDS</th>
                        <th>BETVIP</th>
                        <th>GANHEI</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="escala-body">
                    <!-- O JavaScript injetará as linhas e botões aqui -->
                </tbody>
            </table>
        </div>

        <!-- Painel Administrativo -->
        <div id="admin-panel" class="card">
            <h3>Configurações de Escala</h3>
            <input type="text" id="c1" placeholder="Colaborador 1">
            <input type="text" id="c2" placeholder="Colaborador 2">
            <input type="text" id="c3" placeholder="Colaborador 3">
            <input type="text" id="c4" placeholder="Colaborador 4">
            
            <div style="margin-top:10px;">
                <button id="btn-girar" class="btn-gold">🔄 Girar Rodízio</button>
                <button id="btn-limpar" class="btn-gold" style="background: #dc3545;">🗑️ Limpar Escala</button>
            </div>
        </div>

        <!-- Estrutura do Flash Report -->
        <div class="card">
            <h3>Estrutura do Flash Report</h3>
            <div id="flash-area" style="background:#0f172a; padding:15px; border-radius:5px;">
                <p><strong>FLASH REPORT - (MADRUGADA)</strong></p>
                <p>Data: <span id="data-atual"></span></p>
            </div>
        </div>
    </div>

    <!-- Módulo do Script -->
    <script type="module" src="script.js"></script>
</body>
</html>
